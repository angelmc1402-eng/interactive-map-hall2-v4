<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Ultimate Precision Map V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --verde-deep: #27ae60;
        --rojo-sold: #e74c3c;
        --text-gray: #95a5a6;
        --fuente: 'Inter', sans-serif;
        --map-scale: 1; 
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #e5e7eb; font-family: var(--fuente); }
    
    #map-wrapper { 
        width: 100vw; height: 100vh; 
        position: relative; overflow: hidden;
    }

    #container { 
        position: absolute; 
        top: 0; left: 0;
        transform-origin: 0 0; 
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        cursor: crosshair; 
        touch-action: none; 
        display: inline-block;
    }

    #map-img { display: block; image-rendering: high-quality; max-width: none; user-select: none; -webkit-user-drag: none; }

    body.is-state-1 #container, body.is-state-2 #container { cursor: grab; }
    body.is-state-1 #container:active, body.is-state-2 #container:active { cursor: grabbing; }

    /* --- MESAS --- */
    .mesa { 
        position: absolute; 
        border: 2px solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.3); 
        box-sizing: border-box; 
        border-radius: 2px; 
        pointer-events: none; 
    }
    
    body.is-state-1 .mesa, body.is-state-2 .mesa { pointer-events: auto; cursor: pointer; }
    
    .mesa.commercial { border-color: #3498db; background: rgba(52, 152, 219, 0.3); }
    .mesa.agotada { background: rgba(231, 76, 60, 0.4) !important; border-color: var(--rojo-sold) !important; cursor: not-allowed; }

    body.is-state-1 .mesa:hover, body.is-state-1 .mesa:active,
    body.is-state-2 .mesa:hover, body.is-state-2 .mesa:active { 
        z-index: 999; border-color: white; 
        box-shadow: 0 0 20px rgba(0,0,0,0.5); background: rgba(46, 204, 113, 0.7);
    }
    body.is-state-1 .mesa.commercial:hover, body.is-state-2 .mesa.commercial:hover { background: rgba(52, 152, 219, 0.7); }

    /* --- TOOLTIPS (3 COLUMNAS) --- */
    .custom-tooltip-wrapper {
        position: absolute; bottom: 150%; left: 50%;
        transform: translateX(-50%) translateY(10px) scale(calc(1 / var(--map-scale)));
        transform-origin: bottom center;
        width: 360px; 
        background: white; border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease;
        overflow: hidden; display: flex; flex-direction: column;
        z-index: 1000; 
    }

    body.is-state-1 .mesa:hover .custom-tooltip-wrapper, body.is-state-1 .mesa:active .custom-tooltip-wrapper,
    body.is-state-2 .mesa:hover .custom-tooltip-wrapper, body.is-state-2 .mesa:active .custom-tooltip-wrapper { 
        opacity: 1; transform: translateX(-50%) translateY(0) scale(calc(1 / var(--map-scale))); pointer-events: auto;
    }

    .tooltip-row { display: flex; border-bottom: 1px solid #edf2f7; }
    .tooltip-cell { flex: 1; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .tooltip-cell:not(:last-child) { border-right: 1px solid #edf2f7; } 
    
    .tooltip-label { color: var(--text-gray); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px;}
    .tooltip-value { font-size: 15px; font-weight: 800; color: #1f2937; text-align: center; line-height: 1.1;}
    
    .tooltip-footer { padding: 14px; font-size: 15px; font-weight: 800; color: white; background: var(--verde-deep); text-align: center; }
    .mesa.agotada .tooltip-footer { background: var(--rojo-sold); }
    .mesa.commercial .tooltip-footer { background: #3498db; }

    /* --- MENÚ LATERAL (BACK) --- */
    #side-menu {
        position: fixed; right: -150px; bottom: 100px; 
        transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        z-index: 20000; display: flex; flex-direction: column; gap: 10px;
    }
    #side-menu.visible { right: 30px; } 

    .btn-back {
        background: white; border: none; padding: 12px 20px; border-radius: 50px;
        font-family: var(--fuente); font-weight: 800; font-size: 13px; color: #1f2937;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
    }
    .btn-back:hover { transform: scale(1.05); background: #f8fafc; color: var(--verde-deep); }

    /* --- SELECTOR RÁPIDO DE ZOOM --- */
    #zoom-ui {
        position: fixed; bottom: 30px; right: 30px;
        background: white; padding: 6px; border-radius: 50px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 20000;
        display: flex; gap: 5px;
    }
    .zoom-btn {
        width: 45px; height: 45px; border-radius: 50%; border: none;
        background: transparent; font-weight: 800; font-family: var(--fuente); color: var(--text-gray);
        cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .zoom-btn:hover { background: #f1f5f9; color: #1f2937; }
    .zoom-btn.active { background: #1f2937; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    /* --- LA LUPA MÁGICA --- */
    #loupe {
        position: fixed; width: 260px; height: 260px; border-radius: 50%;
        border: 4px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,0,0,0.2);
        pointer-events: none; overflow: hidden; z-index: 15000; 
        opacity: 0; display: none; background: #fff;
        left: 0; top: 0; will-change: transform;
    }
    #loupe.visible { opacity: 1; display: block; }
    #loupe-inner { position: absolute; transform-origin: 0 0; pointer-events: none; will-change: transform; }
    #loupe .custom-tooltip-wrapper { display: none !important; }

    @media(max-width: 768px) {
        #side-menu { display: none; } 
        #zoom-ui { right: 50%; transform: translateX(50%); bottom: 25px; }
        .custom-tooltip-wrapper { width: 340px; }
        #loupe { display: none !important; } 
    }
</style>
</head>
<body class="is-state-0">

    <div id="map-wrapper">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <div id="loupe">
        <div id="loupe-inner"></div>
    </div>

    <div id="side-menu">
        <button class="btn-back" onclick="setZoomStateUI(0, event)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            BACK
        </button>
    </div>

    <div id="zoom-ui">
        <button class="zoom-btn active" onclick="setZoomStateUI(0, event)">x1</button>
        <button class="zoom-btn" onclick="setZoomStateUI(1, event)">x2</button>
        <button class="zoom-btn" onclick="setZoomStateUI(2, event)">x3</button>
    </div>

<script>
    const diccionarioMesas = new Map();
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuA_zpd7Ays5Xt9MDPQzkzCbxj8s0SaDgQGhuxcthtMl59F3H9oWipgKfsUmbiDloop2b43rqoq8CG/pub?gid=0&single=true&output=csv';

    async function cargarMesas() {
        try {
            const respHTML = await fetch('mesas.html?v=' + new Date().getTime());
            const html = await respHTML.text();
            document.getElementById('capa-mesas').innerHTML = html;
            
            const mesas = document.querySelectorAll('.mesa');
            mesas.forEach(m => {
                const info = m.getAttribute('data-info') || ""; 
                diccionarioMesas.set(info, m); 

                const parts = info.split('-');
                
                let catName = "Diecast";
                let zoneName = parts.length >= 2 ? parts[1] : "-";
                let tableNum = parts.length >= 3 ? parts[2] : (parts[1] || "0"); 

                if (info.includes("MANGACOM")) {
                    catName = "Manga & Comics";
                } else if (info.includes("FIGURES")) {
                    catName = "Figures & Dolls";
                } else if (info.includes("RETRO")) {
                    catName = "Retro & Fashion";
                    zoneName = "-";
                    tableNum = parts[1]; 
                }

                let type = "Collector Table";
                let price = "100,00 €";

                if (/DIECAST-(G|H)/.test(info) || /FIGURES-(C|D)/.test(info)) {
                    type = "Commercial Table";
                    price = "250,00 €";
                    m.classList.add('commercial'); 
                }

                m.innerHTML = `
                    <div class="custom-tooltip-wrapper">
                        <div class="tooltip-row">
                            <div class="tooltip-cell">
                                <span class="tooltip-label">Category</span>
                                <span class="tooltip-value">${catName}</span>
                            </div>
                            <div class="tooltip-cell">
                                <span class="tooltip-label">Zone</span>
                                <span class="tooltip-value">${zoneName}</span>
                            </div>
                            <div class="tooltip-cell">
                                <span class="tooltip-label">Table</span>
                                <span class="tooltip-value">${tableNum}</span>
                            </div>
                        </div>
                        <div class="tooltip-footer">${type}  •  ${price}</div>
                    </div>`;
            });
            
            await sincronizarConExcel();
            document.getElementById('loupe-inner').innerHTML = document.getElementById('container').innerHTML;

        } catch (e) { console.error("Error cargando mesas:", e); }
    }

    async function sincronizarConExcel() {
        try {
            const urlFinal = URL_CSV + '&cache_ignore=' + Date.now();
            const respuesta = await fetch(urlFinal, { method: 'GET', mode: 'cors', cache: 'no-cache' });
            const filas = (await respuesta.text()).split(/\r?\n/);

            filas.forEach((fila, index) => {
                if (index === 0 || !fila.trim()) return;
                const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 3) {
                    const estado = col[1].replace(/["']/g, "").trim().toUpperCase(); 
                    const idMesa = col[2].replace(/["']/g, "").trim(); 
                    const mesaDiv = diccionarioMesas.get(idMesa);
                    
                    if (mesaDiv) {
                        if (estado.includes("VENDIDA") || estado.includes("SOLD")) {
                            mesaDiv.classList.add('agotada');
                            mesaDiv.querySelector('.tooltip-footer').innerText = "SOLD OUT";
                        } else {
                            mesaDiv.classList.remove('agotada');
                        }
                    }
                }
            });
            document.getElementById('loupe-inner').innerHTML = document.getElementById('container').innerHTML;
        } catch (err) { console.error("Error sincronizando:", err); }
    }

    // ==========================================
    // MOTOR DE TRIPLE ZOOM & NAVEGACIÓN
    // ==========================================
    const container = document.getElementById('container');
    const mapImg = document.getElementById('map-img');
    
    let currentZoomState = 0; 
    let baseScale = 1; 
    let currentScale = 1;
    
    let currentX = 0, currentY = 0;
    let isDragging = false;
    let startX, startY, initialX, initialY;

    function initMapPosition() {
        if(mapImg.naturalWidth === 0) {
            setTimeout(initMapPosition, 100);
            return;
        }
        
        const scaleX = window.innerWidth / mapImg.naturalWidth;
        const scaleY = window.innerHeight / mapImg.naturalHeight;
        
        baseScale = Math.min(scaleX, scaleY) * 0.98;
        
        if (baseScale > 1) baseScale = 1;

        setZoomState(0, null, null, true); 
    }

    window.onload = () => {
        if(mapImg.complete) initMapPosition();
        else mapImg.onload = initMapPosition;
        cargarMesas();
    };

    window.addEventListener('resize', () => {
        if(currentZoomState === 0) initMapPosition();
    });

    function setZoomState(state, clickClientX = null, clickClientY = null, instant = false) {
        currentZoomState = state;
        
        let zoomMultiplier = 1;
        
        // --- AQUÍ ESTÁ EL CAMBIO PARA MÓVIL (MUCHO MÁS SUAVE Y ABARCABLE) ---
        if (state === 1) zoomMultiplier = window.innerWidth < 768 ? 3.0 : 2.5; 
        if (state === 2) zoomMultiplier = window.innerWidth < 768 ? 7.0 : 6.0;

        let newScale = baseScale * zoomMultiplier;

        document.documentElement.style.setProperty('--map-scale', newScale);

        document.querySelectorAll('.zoom-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === state);
        });
        document.body.className = 'is-state-' + state;

        container.style.transition = instant ? 'none' : 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';

        if (state === 0) {
            currentScale = baseScale;
            currentX = (window.innerWidth - (mapImg.naturalWidth * baseScale)) / 2;
            currentY = (window.innerHeight - (mapImg.naturalHeight * baseScale)) / 2;
            
            container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
            
            document.getElementById('side-menu').classList.remove('visible');
            
            document.querySelectorAll('.custom-tooltip-wrapper').forEach(t => {
                t.style.opacity = '0'; t.style.pointerEvents = 'none';
                setTimeout(() => { t.style.opacity = ''; t.style.pointerEvents = ''; }, 300);
            });
        } else {
            document.getElementById('side-menu').classList.add('visible');
            
            if (clickClientX !== null && clickClientY !== null) {
                const mapUnscaledX = (clickClientX - currentX) / currentScale;
                const mapUnscaledY = (clickClientY - currentY) / currentScale;

                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                currentX = centerX - (mapUnscaledX * newScale);
                currentY = centerY - (mapUnscaledY * newScale);
            } else {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const mapUnscaledX = (centerX - currentX) / currentScale;
                const mapUnscaledY = (centerY - currentY) / currentScale;
                
                currentX = centerX - (mapUnscaledX * newScale);
                currentY = centerY - (mapUnscaledY * newScale);
            }
            
            currentScale = newScale;
            container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
        }
    }

    container.addEventListener('click', (e) => {
        if (isDragging) return; 
        document.getElementById('loupe').classList.remove('visible');

        let nextState = currentZoomState + 1;
        if (nextState > 2) nextState = 0; 

        setZoomState(nextState, e.clientX, e.clientY);
    });

    window.setZoomStateUI = function(state, event) {
        if (event) event.stopPropagation(); 
        document.getElementById('loupe').classList.remove('visible');
        setZoomState(state, null, null);
    };

    function startDrag(clientX, clientY) {
        if (currentZoomState === 0) return; 
        isDragging = true;
        startX = clientX;
        startY = clientY;
        initialX = currentX;
        initialY = currentY;
        container.style.transition = 'none'; 
    }

    function doDrag(clientX, clientY) {
        if (!isDragging) return;
        currentX = initialX + (clientX - startX);
        currentY = initialY + (clientY - startY);
        container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
    }

    function endDrag() {
        if (!isDragging) return;
        setTimeout(() => isDragging = false, 50); 
        container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)'; 
    }

    container.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('mouseleave', endDrag);

    container.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', (e) => {
        if (currentZoomState > 0) e.preventDefault(); 
        doDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

    // ==========================================
    // LA LUPA MÁGICA
    // ==========================================
    const loupe = document.getElementById('loupe');
    const loupeInner = document.getElementById('loupe-inner');
    const loupeSize = 260; 
    const loupeMultiplier = 1.6; 
    
    window.addEventListener('pointermove', (e) => {
        if (window.innerWidth < 768 || e.pointerType === 'touch' || currentZoomState > 0 || isDragging) {
            loupe.classList.remove('visible');
            return;
        }

        const rect = container.getBoundingClientRect();
        
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
            loupe.classList.remove('visible');
            return;
        }

        loupe.classList.add('visible');
        loupe.style.transform = `translate(${e.clientX - loupeSize / 2}px, ${e.clientY - loupeSize / 2}px)`;

        loupeInner.style.width = mapImg.naturalWidth + 'px';
        loupeInner.style.height = mapImg.naturalHeight + 'px';

        const targetZoom = baseScale * loupeMultiplier;

        const mapUnscaledX = (e.clientX - currentX) / baseScale;
        const mapUnscaledY = (e.clientY - currentY) / baseScale;

        const tx = (loupeSize / 2) - (mapUnscaledX * targetZoom);
        const ty = (loupeSize / 2) - (mapUnscaledY * targetZoom);

        loupeInner.style.transform = `translate(${tx}px, ${ty}px) scale(${targetZoom})`;
    });

    setInterval(sincronizarConExcel, 120000); 

</script>
</body>
</html>
