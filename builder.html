
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Precision Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --azul-sel: #00d2d3;
        --rojo-del: #ff6b6b;
        --naranja-rot: #ff9f43;
        --dark-bg: #222f3e;
        --panel-bg: #ffffff;
        --fuente: 'Inter', sans-serif;
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--dark-bg); font-family: var(--fuente); }
    
    #viewport { width: 100vw; height: 100vh; overflow: auto; display: block; cursor: grab; }
    #viewport:active { cursor: grabbing; }
    
    #container { position: relative; transform-origin: 0 0; transition: transform 0.05s ease-out; display: inline-block; }
    img { display: block; image-rendering: high-quality; max-width: none; pointer-events: none; user-select: none; }

    /* MESAS */
    .mesa { 
        position: absolute; 
        border: 2px solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.4); 
        z-index: 10; cursor: pointer; 
        box-sizing: border-box;
        border-radius: 2px;
    }
    
    .mesa:hover { background: rgba(46, 204, 113, 0.8); z-index: 100; border-color: white; }
    
    .mesa.selected {
        border: 2px solid var(--azul-sel);
        background: rgba(0, 210, 211, 0.6);
        z-index: 200;
        box-shadow: 0 0 20px rgba(0, 210, 211, 0.8);
    }

    /* PALETA IZQUIERDA */
    #palette {
        position: fixed; top: 10px; left: 10px; width: 300px; 
        background: var(--panel-bg); padding: 20px; border-radius: 8px;
        box-shadow: 5px 0 30px rgba(0,0,0,0.3); z-index: 20000;
        display: flex; flex-direction: column; gap: 15px;
    }
    
    #palette h3 { margin: 0; font-size: 16px; color: #333; text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    .btn-create {
        width: 100%; padding: 15px; background: #3b82f6; color: white;
        border: none; border-radius: 6px; font-weight: 800; cursor: pointer;
        font-size: 14px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); transition: all 0.2s;
    }
    .btn-create:hover { background: #2563eb; transform: translateY(-2px); }

    /* SINTONIZADOR DE TAMAÑOS */
    .tuner-box {
        background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px;
    }
    .tuner-title { font-size: 12px; font-weight: 800; color: #475569; margin-bottom: 10px; display: flex; justify-content: space-between;}
    .tuner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .tuner-col { display: flex; flex-direction: column; gap: 5px; }
    .tuner-col label { font-size: 10px; font-weight: bold; color: #64748b; }
    .tuner-col input { 
        width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; 
        font-family: monospace; font-size: 12px; box-sizing: border-box;
    }

    /* PROPIEDADES FLOTANTE */
    #prop-float {
        position: fixed; top: 20px; right: 20px; background: white; padding: 15px;
        border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 20000;
        width: 220px; display: none;
    }
    #prop-float.active { display: block; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }

    .btn-action { width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 12px; }
    .btn-dup { background: var(--verde-base); color: white; }
    .btn-rot { background: var(--naranja-rot); color: white; }
    .btn-del { background: var(--rojo-del); color: white; }

    #export-bar {
        position: fixed; bottom: 20px; left: 330px; right: 20px;
        pointer-events: none; display: flex; justify-content: center; z-index: 20000;
    }
    .btn-exp { pointer-events: auto; background: #2d3436; color: #00d2d3; border: 2px solid #00d2d3; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: transform 0.2s; }
    .btn-exp:hover { transform: translateY(-3px) scale(1.05); background: #00d2d3; color: white; }

    #clipboard-area { position: absolute; left: -9999px; }
    .shortcuts { font-size: 11px; color: #64748b; line-height: 1.6; background: #f1f5f9; padding: 10px; border-radius: 6px;}
</style>
</head>
<body>

    <div id="palette">
        <h3>📐 Precision Builder</h3>
        
        <button class="btn-create" onclick="crearPieza()">➕ CREAR PIEZA</button>

        <div class="tuner-box">
            <div class="tuner-title">
                <span>AJUSTE DE TAMAÑO (%)</span>
            </div>
            
            <div class="tuner-grid">
                <div class="tuner-col">
                    <label>HORIZ. Ancho (W)</label>
                    <input type="number" step="0.01" id="hw" value="1.17" oninput="updateAllSizes()">
                    <label>HORIZ. Alto (H)</label>
                    <input type="number" step="0.01" id="hh" value="0.41" oninput="updateAllSizes()">
                </div>
                <div class="tuner-col">
                    <label>VERT. Ancho (W)</label>
                    <input type="number" step="0.01" id="vw" value="0.34" oninput="updateAllSizes()">
                    <label>VERT. Alto (H)</label>
                    <input type="number" step="0.01" id="vh" value="1.38" oninput="updateAllSizes()">
                </div>
            </div>
            <div style="font-size: 10px; color: #94a3b8; text-align: center; margin-top: 5px;">Los cambios se aplican en tiempo real.</div>
        </div>

        <div class="shortcuts">
            <b>ATAJOS DE TECLADO:</b><br>
            • <b>R</b>: Girar Mesa<br>
            • <b>D</b>: Duplicar (Suma +1 al ID)<br>
            • <b>Supr</b>: Borrar mesa<br>
            • <b>Flechas</b>: Mover al milímetro
        </div>
    </div>

    <div id="prop-float">
        <label style="font-size:10px; font-weight:bold; color:#999;">ID MESA (Click para editar)</label>
        <input type="text" id="inp-id" style="width:100%; padding:8px; border:2px solid #ddd; border-radius:4px; font-weight:bold; font-family:monospace; margin-bottom:10px; box-sizing: border-box;">
        
        <button class="btn-action btn-rot" onclick="rotateSelected()">🔄 GIRAR (R)</button>
        <button class="btn-action btn-dup" onclick="duplicateSelected()">✨ DUPLICAR (D)</button>
        <button class="btn-action btn-del" onclick="deleteSelected()">🗑️ ELIMINAR</button>
    </div>

    <div id="export-bar">
        <button class="btn-exp" onclick="exportHTML()">💾 EXPORTAR HTML</button>
    </div>

    <div id="viewport">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2 V2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <textarea id="clipboard-area"></textarea>

<script>
    // --- VARIABLES GLOBALES DE TAMAÑO ---
    let SIZE_H = { w: 1.17, h: 0.41 }; 
    let SIZE_V = { w: 0.34, h: 1.38 }; 

    let scale = 0.2;
    const container = document.getElementById('container');
    const viewport = document.getElementById('viewport');
    const mapImg = document.getElementById('map-img');
    const capaMesas = document.getElementById('capa-mesas');
    const propPanel = document.getElementById('prop-float');
    const inputId = document.getElementById('inp-id');

    let selectedElement = null;
    let isDragging = false;
    let dragOffset = { x: 0, y: 0 };

    window.onload = () => {
        if(mapImg.complete) init();
        else mapImg.onload = init;
    };

    async function init() {
        fit();
        viewport.addEventListener('wheel', handleWheel, { passive: false });
        
        // Sincronizar inputs visuales con variables iniciales
        document.getElementById('hw').value = SIZE_H.w;
        document.getElementById('hh').value = SIZE_H.h;
        document.getElementById('vw').value = SIZE_V.w;
        document.getElementById('vh').value = SIZE_V.h;
    }

    // --- ACTUALIZADOR DE TAMAÑOS EN TIEMPO REAL ---
    window.updateAllSizes = function() {
        SIZE_H.w = parseFloat(document.getElementById('hw').value) || 1.17;
        SIZE_H.h = parseFloat(document.getElementById('hh').value) || 0.41;
        SIZE_V.w = parseFloat(document.getElementById('vw').value) || 0.34;
        SIZE_V.h = parseFloat(document.getElementById('vh').value) || 1.38;

        document.querySelectorAll('.mesa').forEach(m => {
            const w = parseFloat(m.style.width);
            const h = parseFloat(m.style.height);
            const isHorizontal = w > h; // Lógica simple: Si es más ancha que alta, es H.

            if (isHorizontal) {
                m.style.width = SIZE_H.w + '%';
                m.style.height = SIZE_H.h + '%';
            } else {
                m.style.width = SIZE_V.w + '%';
                m.style.height = SIZE_V.h + '%';
            }
        });
    }

    // --- CREAR UNA PIEZA INDIVIDUAL ---
    window.crearPieza = function() {
        let defaultId = "DIECAST-A-1";
        
        // Si hay una seleccionada, sugerir el siguiente número
        if (selectedElement) {
            let lastId = selectedElement.getAttribute('data-info');
            let parts = lastId.split('-');
            if(!isNaN(parts[parts.length-1])) {
                parts[parts.length-1] = parseInt(parts[parts.length-1]) + 1;
                defaultId = parts.join('-');
            }
        }

        let idStr = prompt("Introduce el ID de la nueva mesa (Ej: DIECAST-A-1, MANGACOM-B-12):", defaultId);
        
        if (!idStr) return; // Cancelado
        idStr = idStr.trim().toUpperCase().replace(/\s+/g, '-');

        if(document.querySelector(`[data-info="${idStr}"]`)) {
            alert(`⚠️ La mesa ${idStr} ya existe en el mapa.`);
            return;
        }

        spawnTable(idStr);
    }

    function spawnTable(idName) {
        const div = document.createElement('div');
        div.className = 'mesa';
        div.setAttribute('data-info', idName);
        
        const rect = viewport.getBoundingClientRect();
        const centerX = (rect.width / 2 - container.getBoundingClientRect().left) / scale;
        const centerY = (rect.height / 2 - container.getBoundingClientRect().top) / scale;

        const leftP = (centerX / mapImg.naturalWidth) * 100;
        const topP = (centerY / mapImg.naturalHeight) * 100;

        div.style.width = SIZE_H.w + '%';
        div.style.height = SIZE_H.h + '%';
        div.style.top = topP.toFixed(2) + '%';
        div.style.left = leftP.toFixed(2) + '%';

        capaMesas.appendChild(div);
        addInteractions(div);
        selectMesa(div);
    }

    // --- INTERACCIONES ---
    function addInteractions(el) {
        el.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            selectMesa(el);
            isDragging = true;
            const rect = el.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
        });
    }

    document.addEventListener('mousemove', (e) => {
        if (!isDragging || !selectedElement) return;
        e.preventDefault();
        const containerRect = container.getBoundingClientRect();
        let x = (e.clientX - containerRect.left - dragOffset.x) / scale;
        let y = (e.clientY - containerRect.top - dragOffset.y) / scale;
        
        const leftP = (x / mapImg.naturalWidth) * 100;
        const topP = (y / mapImg.naturalHeight) * 100;
        
        selectedElement.style.left = leftP.toFixed(4) + '%';
        selectedElement.style.top = topP.toFixed(4) + '%';
    });

    document.addEventListener('mouseup', () => isDragging = false);

    function selectMesa(el) {
        if(selectedElement) selectedElement.classList.remove('selected');
        selectedElement = el;
        selectedElement.classList.add('selected');
        propPanel.classList.add('active');
        inputId.value = selectedElement.getAttribute('data-info');
    }

    viewport.addEventListener('mousedown', (e) => {
        if(e.target === viewport || e.target === container || e.target === mapImg) {
            if(selectedElement) selectedElement.classList.remove('selected');
            selectedElement = null;
            propPanel.classList.remove('active');
        }
    });

    inputId.addEventListener('input', (e) => {
        if(selectedElement) selectedElement.setAttribute('data-info', e.target.value.toUpperCase());
    });

    // --- GIRO ---
    window.rotateSelected = function() {
        if(!selectedElement) return;
        const currentW = parseFloat(selectedElement.style.width);
        const currentH = parseFloat(selectedElement.style.height);
        const isHorizontal = currentW > currentH; 
        
        if (isHorizontal) {
            selectedElement.style.width = SIZE_V.w + '%';
            selectedElement.style.height = SIZE_V.h + '%';
        } else {
            selectedElement.style.width = SIZE_H.w + '%';
            selectedElement.style.height = SIZE_H.h + '%';
        }
    }

    // --- DUPLICAR ---
    window.duplicateSelected = function() {
        if(!selectedElement) return;
        const clone = selectedElement.cloneNode(true);
        let oldId = selectedElement.getAttribute('data-info');
        
        const parts = oldId.split('-');
        if(!isNaN(parts[parts.length-1])) {
            parts[parts.length-1] = parseInt(parts[parts.length-1]) + 1;
            oldId = parts.join('-');
        }
        
        // Bucle por si la mesa sugerida ya existe
        while(document.querySelector(`[data-info="${oldId}"]`)) {
             let p = oldId.split('-');
             p[p.length-1] = parseInt(p[p.length-1]) + 1;
             oldId = p.join('-');
        }
        clone.setAttribute('data-info', oldId);

        const currentW = parseFloat(selectedElement.style.width);
        const currentH = parseFloat(selectedElement.style.height);
        const isHorizontal = currentW > currentH;

        let top = parseFloat(selectedElement.style.top);
        let left = parseFloat(selectedElement.style.left);

        if (isHorizontal) left += (SIZE_H.w + 0.05); 
        else top += (SIZE_V.h + 0.05);

        clone.style.top = top.toFixed(4) + '%';
        clone.style.left = left.toFixed(4) + '%';

        capaMesas.appendChild(clone);
        addInteractions(clone);
        selectMesa(clone);
    }

    window.deleteSelected = function() {
        if(selectedElement) {
            selectedElement.remove();
            selectedElement = null;
            propPanel.classList.remove('active');
        }
    }

    // --- TECLADO ---
    document.addEventListener('keydown', (e) => {
        if(!selectedElement) return;
        if (document.activeElement === inputId) return;

        if(e.key.startsWith('Arrow')) {
            e.preventDefault();
            const step = e.shiftKey ? 0.1 : 0.01; 
            let t = parseFloat(selectedElement.style.top);
            let l = parseFloat(selectedElement.style.left);
            if(e.key === 'ArrowUp') t -= step;
            if(e.key === 'ArrowDown') t += step;
            if(e.key === 'ArrowLeft') l -= step;
            if(e.key === 'ArrowRight') l += step;
            selectedElement.style.top = t.toFixed(4) + '%';
            selectedElement.style.left = l.toFixed(4) + '%';
        }

        if(e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        if(e.key.toLowerCase() === 'd') duplicateSelected();
        if(e.key.toLowerCase() === 'r') rotateSelected();
    });

    // --- ZOOM ---
    function handleWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        let newScale = scale * delta;
        if(newScale > 0.05 && newScale < 15) {
            scale = newScale;
            container.style.transform = `scale(${scale})`;
        }
    }

    // --- EXPORTAR ---
    window.exportHTML = function() {
        let html = "";
        const mesas = document.querySelectorAll('.mesa');
        
        const arrayMesas = Array.from(mesas).sort((a, b) => {
            return a.getAttribute('data-info').localeCompare(b.getAttribute('data-info'), undefined, {numeric: true});
        });

        arrayMesas.forEach(m => {
            html += `<div class="mesa" data-info="${m.getAttribute('data-info')}" style="${m.getAttribute('style')}"></div>\n`;
        });

        const area = document.getElementById('clipboard-area');
        area.value = html;
        area.select();
        document.execCommand('copy');
        alert("¡Bloques Copiados! 🧩 (" + mesas.length + " mesas).\n\nGuarda esto a buen recaudo.");
    }

    function fit() {
        const imgWidth = mapImg.naturalWidth || 5000;
        scale = (window.innerWidth / imgWidth) * 0.9;
        container.style.transform = `scale(${scale})`;
    }
</script>
</body>
</html>
