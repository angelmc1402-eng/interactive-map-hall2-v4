    function generar() {
        let html = "";
        
        targets.forEach(target => {
            const anillo = target.ref;
            const refBase = anillo[0]; // La primera mesa del anillo se usa como ancla (offset 0,0)

            anillo.forEach((mesa, i) => {
                // Matemáticas: Base Objetivo + (Mesa Actual - Base de Referencia)
                const finalTop = target.base.t + (mesa.t - refBase.t);
                const finalLeft = target.base.l + (mesa.l - refBase.l);
                
                let idName = `${target.id}-${i+1}`;
                // Requisito especial: Retro solo lleva el número
                if (target.id === "MIX-A") {
                    idName = `RETRO-${i+1}`;
                }

                html += `<div class="mesa" data-info="${idName}" style="width: ${mesa.w}%; height: ${mesa.h}%; top: ${finalTop.toFixed(4)}%; left: ${finalLeft.toFixed(4)}%;"></div>\n`;
            });
        });
        
        const txt = document.getElementById('resultado');
        txt.value = html;
        txt.select();
        document.execCommand('copy');
